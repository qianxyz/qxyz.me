services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    restart: unless-stopped
    networks: [web]

  caddy:
    image: caddy:2-alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../public:/srv/public:ro
    restart: unless-stopped
    networks: [web]

networks:
  web:
    external: true
